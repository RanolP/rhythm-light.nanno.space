<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }
      canvas#main {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: transparent;
      }
      iframe#youtube {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
      }
    </style>
    <title>website</title>
  </head>
  <body>
    <iframe
      id="youtube"
      src="https://www.youtube.com/embed/mZ0ISOb2ZkQ?enablejsapi=1&autoplay=1&mute=1&loop=1&playlist=mZ0ISOb2ZkQ&controls=0&disablekb=1&fs=0&iv_load_policy=3&playsinline=1&rel=0"
      title="YouTube video player"
      frameborder="0"
      allow="accelerometer; autoplay; encrypted-media"
      referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>
    <canvas id="main"></canvas>
    <script type="module" src="/src/app/main.ts"></script>
  </body>
</html>
